<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-6">
            <div class="card card-primary mb-4">
                <div class="card-header">
                    <div class="card-title">Formulario de contacto</div>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input 
                            type="text" 
                            class="form-control {% if errores.nombre_error %}is-invalid{% endif %}" 
                            id="nombre" 
                            name="nombre"
                            value="{{ valores.nombre }}" 
                             />
                            {% if errores.nombre_error %}
                            <div class="text-danger small">
                                {{ errores.nombre_error }}
                            </div>
                            {% endif %}
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input 
                            type="email" 
                            class="form-control {% if errores.email_error %}is-invalid{% endif %}" 
                            id="email" 
                            name="email" 
                            value="{{ valores.email }}"
                            />
                            {% if errores.email_error %}
                            <div class="text-danger small">
                                {{ errores.email_error }}
                            </div>
                            {% endif %}
                        </div>
                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea 
                            class="form-control {% if errores.mensaje_error %}is-invalid{% endif %}" 
                            name="mensaje" 
                            id="mensaje" 
                            rows="4"
                            >{{ valores.mensaje }}</textarea>
                            {% if errores.mensaje_error %}
                            <div class="text-danger small">
                                {{ errores.mensaje_error }}
                            </div>
                            {% endif %}
                        </div>
                    </div>
                    <div class="card-footer">
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
