<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--begin::Third Party Plugin(Bootstrap Icons)-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        crossorigin="anonymous" />
    <!--end::Third Party Plugin(Bootstrap Icons)-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>{% block title %}{% endblock %}</title>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Biblioteca</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'book_list' %}active{% endif %}" href="{% url 'book_list' %}" aria-current="page" href="#">Libros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'authors_list' %}active{% endif %}" href="{% url 'authors_list' %}">Autores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'publishers_list' %}active{% endif %}" href="{% url 'publishers_list' %}">Publicaciones</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <form id="delete-form" method="POST" style="display: none;">
    {% csrf_token %}
    </form>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
  

<script>
    document.querySelectorAll(".delete-btn").forEach((btn_delete) => {
        btn_delete.addEventListener("click", function (e) {
            e.preventDefault();

            const url = this.dataset.url;
            const text = this.dataset.text;
            const title = this.dataset.title;

            Swal.fire({
                title: title,
                text: text,
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                customClass: {
                    /*confirmButton: "btn btn-success",
                    cancelButton: "btn btn-danger"*/
                },
                confirmButtonText: "Eliminar!",
                cancelButtonText: "Cancelar!",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    const form = document.getElementById("delete-form");
                    form.action = url;
                    form.submit();
                }
            });
        });
    });
</script>
    

<script>
    let icono;
    {% if messages %}
    {% for message in messages %}

    {% if message.tags == "success" %}
    icono = "success"
    {% elif message.tags == "error" %}
    icono = "error"
    {% endif %}

    console.log(icono)
    Swal.fire({
        position: "top-end",
        icon: icono,
        title: '{{ message|escapejs }}',
        showConfirmButton: false,
        timer: 1500,
        timerProgressBar: true,
        customClass: {
            popup: 'colored-toast',
        },
        toast: true,
    });
    {% endfor %}
    {% endif %}
</script>
    
{% block extra_js %}{% endblock %}

</body>

</html>
